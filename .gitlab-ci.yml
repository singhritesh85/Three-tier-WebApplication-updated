default:
  tags:
  - gitlab-runner-1

stages:
  - build
  - docker_image_build
  - deployment_to_gke_cluster

build_job:
  stage: build
  before_script:
    - export JAVA_HOME="/usr/lib/jvm/java-17-openjdk-17.0.18.0.8-1.el8.x86_64"
    - export PATH="$PATH:$JAVA_HOME/bin:/opt/apache-maven/bin:/opt/node-v16.0.0/bin:/usr/local/bin"
  script:
    - echo "Building artifact..."
    - mvn clean install
  artifacts:
    paths:
      - target/vprofile-v2-SNAPSHOT.war

docker_image:
  stage: docker_image_build
  before_script:
    - export JAVA_HOME="/usr/lib/jvm/java-17-openjdk-17.0.18.0.8-1.el8.x86_64"
    - export PATH="$PATH:$JAVA_HOME/bin:/opt/apache-maven/bin:/opt/node-v16.0.0/bin:/usr/local/bin"
    - mvn clean install
  script:
    - docker build -t us-central1-docker.pkg.dev/wise-trainer-244916/multicloud-gcr-dev/dexter:$CI_PIPELINE_ID -f Dockerfile .
    - docker push us-central1-docker.pkg.dev/wise-trainer-244916/multicloud-gcr-dev/dexter:$CI_PIPELINE_ID
  dependencies:
    - build_job

deployment_to_gke:
  stage: deployment_to_gke_cluster
  script:
    - git clone https://dexter:$HELM_REPO_FOR_GKE_ACCESS_TOKEN@gitlab.singhritesh85.com/dexter/helm-repo-for-update-GKE.git
    - helm upgrade --install tomcat helm-repo-for-update-GKE/folo --create-namespace --namespace=backend --set image.repository=us-central1-docker.pkg.dev/wise-trainer-244916/multicloud-gcr-dev/dexter,image.tag=$CI_PIPELINE_ID,replicaCount=1,service.type=ClusterIP,service.port=80 --kube-context=gke_wise-trainer-244916_us-central1_multicloud-gke-cluster
    - kubectl get pods -n backend --context=gke_wise-trainer-244916_us-central1_multicloud-gke-cluster
  dependencies:
    - docker_image

    
